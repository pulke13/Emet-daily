<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#121212">
<title>Emet Daily</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root{
    --bg:#121212;
    --card:#241c2e;
    --card-solid:#2b2138;
    --border:1px solid rgba(255,255,255,0.10);
    --text:#ffffff;
    --muted:#9aa0b4;
    --do:#FF4C4C;
    --schedule:#007BFF;
    --delegate:#FFBF00;
    --eliminate:#777777;
    --backlog:#8a8f9e;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:'Segoe UI',system-ui,-apple-system,Roboto,'Arial Hebrew',sans-serif;
    overscroll-behavior-y:none;}
  body{padding-bottom:96px;}

  header{position:sticky;top:0;z-index:20;background:rgba(18,18,18,0.92);
    backdrop-filter:blur(8px);
    padding-top:calc(14px + env(safe-area-inset-top));padding-bottom:10px;
    padding-left:16px;padding-right:16px;
    display:flex;align-items:center;gap:10px;border-bottom:var(--border);}
  header h1{font-size:19px;margin:0;font-weight:800;letter-spacing:.3px;flex:1;}
  header h1 .bolt{color:var(--delegate);}
  .icon-btn{background:rgba(255,255,255,0.08);border:none;color:#fff;
    min-width:40px;height:40px;padding:0 8px;border-radius:10px;font-size:16px;display:flex;
    align-items:center;justify-content:center;transition:transform .08s,background .15s;font-weight:700;}
  .icon-btn:active{transform:scale(.90);background:rgba(255,255,255,0.18);}
  #btnLang{font-size:14px;}

  .tabs{display:flex;gap:8px;padding:12px 16px 4px;}
  .tab{flex:1;padding:10px;border-radius:10px;border:var(--border);
    background:rgba(255,255,255,0.04);color:var(--muted);font-weight:700;
    font-size:14px;text-align:center;transition:all .15s;}
  .tab.active{background:var(--schedule);color:#fff;border-color:transparent;}
  .tab:active{transform:scale(.97);}

  main{padding:8px 14px 0;}

  .zone{background:var(--card);border:var(--border);border-radius:16px;
    margin:12px 0;padding:12px;transition:box-shadow .15s,outline .1s;}
  .zone.drop-hot{outline:2px dashed rgba(255,255,255,0.6);outline-offset:2px;}
  .zone-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .dot{width:11px;height:11px;border-radius:50%;flex:none;}
  .zone-title{font-weight:800;font-size:14px;}
  .zone-sub{font-size:11px;color:var(--muted);font-weight:600;}
  .count{margin-inline-start:auto;font-size:12px;color:var(--muted);
    background:rgba(255,255,255,0.06);padding:2px 9px;border-radius:20px;font-weight:700;}
  .zone-body{display:flex;flex-direction:column;gap:8px;min-height:12px;}
  .empty{color:var(--muted);font-size:12px;text-align:center;padding:10px 0;font-style:italic;}

  .task{background:rgba(255,255,255,0.05);border:var(--border);border-radius:12px;
    padding:11px 12px;display:flex;align-items:flex-start;gap:8px;
    transition:transform .08s,opacity .15s;touch-action:pan-y;}
  .task:active{transform:scale(.985);}
  .task.dragging{opacity:.35;}
  .task .check{width:22px;height:22px;border-radius:6px;border:2px solid var(--muted);
    flex:none;margin-top:1px;display:flex;align-items:center;justify-content:center;
    font-size:14px;color:#fff;}
  .task.done .check{background:var(--schedule);border-color:var(--schedule);}
  .task .body{flex:1;min-width:0;}
  .task .ttl{font-size:15px;font-weight:600;word-break:break-word;line-height:1.3;}
  .task.done .ttl{text-decoration:line-through;color:var(--muted);}
  .task .meta{margin-top:4px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
  .badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:700;
    background:rgba(255,255,255,0.08);color:var(--muted);}
  .badge.alarm{background:rgba(255,191,0,0.18);color:var(--delegate);}
  .badge.due-soon{background:rgba(255,76,76,0.20);color:#ff8080;}
  .trash{color:var(--muted);font-size:16px;padding:4px 6px;align-self:center;flex:none;
    border-radius:8px;transition:background .12s,color .12s;}
  .trash:active{background:rgba(255,76,76,0.25);color:var(--do);}
  .grip{color:var(--muted);font-size:16px;padding:2px 4px;align-self:center;
    touch-action:none;cursor:grab;flex:none;}

  #ghost{position:fixed;z-index:999;pointer-events:none;opacity:.95;
    box-shadow:0 12px 30px rgba(0,0,0,.6);transform:rotate(-1.5deg);
    width:auto;max-width:88vw;}

  .fab{position:fixed;inset-inline-end:18px;bottom:calc(18px + env(safe-area-inset-bottom));
    width:60px;height:60px;border-radius:50%;background:var(--schedule);color:#fff;
    border:none;font-size:30px;box-shadow:0 8px 24px rgba(0,123,255,.5);z-index:30;
    display:flex;align-items:center;justify-content:center;transition:transform .1s;}
  .fab:active{transform:scale(.9);}

  .sheet-wrap{position:fixed;inset:0;z-index:50;display:none;}
  .sheet-wrap.open{display:block;}
  .backdrop{position:absolute;inset:0;background:rgba(0,0,0,.55);animation:fade .2s;}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .sheet{position:absolute;left:0;right:0;bottom:0;background:var(--card-solid);
    border-radius:20px 20px 0 0;padding:18px 18px calc(20px + env(safe-area-inset-bottom));
    max-height:92vh;overflow:auto;animation:slideup .25s cubic-bezier(.2,.8,.2,1);}
  @keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .sheet h2{margin:2px 0 14px;font-size:18px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;
    font-weight:700;text-transform:uppercase;letter-spacing:.4px;}
  input[type=text],input[type=password],textarea,select,input[type=time],input[type=date]{
    width:100%;background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.15);border-radius:10px;color:#fff;padding:12px;
    font-size:15px;font-family:inherit;}

  .hint{color:var(--muted);font-size:11.5px;padding:6px 18px 0;line-height:1.4;}

  /* Visible, themed scrollbar (desktop browsers; phones use overlay bars) */
  *{scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.28) transparent;}
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-track{background:rgba(255,255,255,0.05);border-radius:5px;}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.28);border-radius:5px;}
  ::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.45);}
  .stats{color:var(--muted);font-size:12px;font-weight:700;padding:6px 18px 0;text-align:center;}

  /* Segmented control (Repeat: None / Daily / Weekly) */
  .segmented{display:flex;gap:6px;}
  .segmented .seg{flex:1;text-align:center;padding:11px 6px;border-radius:10px;
    border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);
    color:var(--muted);font-weight:700;font-size:14px;transition:all .12s;}
  .segmented .seg.sel{background:var(--schedule);color:#fff;border-color:transparent;}
  .segmented .seg:active{transform:scale(.97);}
  textarea{min-height:80px;resize:vertical;}
  /* Custom dropdown (replaces native <select>, which can't be styled reliably,
     especially in Hebrew / right-to-left). */
  .dropdown{position:relative;}
  /* Arrow sits at the reading-start edge: far LEFT in English, far RIGHT in Hebrew. */
  .dd-selected{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.15);border-radius:10px;color:#fff;padding:12px;font-size:15px;}
  .dd-selected .dd-text{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .dd-caret{color:var(--muted);transition:transform .15s;font-size:12px;flex:none;}
  .dropdown.open .dd-caret{transform:rotate(180deg);}
  .dd-list{display:none;margin-top:6px;background:var(--card-solid);
    border:1px solid rgba(255,255,255,0.15);border-radius:10px;overflow:hidden;}
  .dropdown.open .dd-list{display:block;}
  .dd-item{padding:12px;font-size:15px;color:#fff;border-bottom:1px solid rgba(255,255,255,0.06);}
  .dd-item:last-child{border-bottom:none;}
  .dd-item.sel{background:rgba(0,123,255,0.28);font-weight:700;}
  .dd-item:active{background:rgba(255,255,255,0.12);}
  .row{display:flex;gap:10px;}
  .row>*{flex:1;}
  .swatches{display:flex;gap:10px;flex-wrap:wrap;}
  .swatch{width:34px;height:34px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);}
  .swatch.sel{border-color:#fff;transform:scale(1.12);}
  .btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:16px;
    font-weight:800;color:#fff;transition:transform .08s,filter .1s;margin-top:4px;}
  .btn:active{transform:scale(.98);filter:brightness(1.1);}
  .btn.primary{background:var(--schedule);}
  .btn.danger{background:var(--do);}
  .btn.ghost{background:rgba(255,255,255,0.08);}
  .btn-row{display:flex;gap:10px;margin-top:8px;}
  .btn-row .btn{margin-top:0;}

  .toast{position:fixed;left:50%;bottom:calc(90px + env(safe-area-inset-bottom));
    transform:translateX(-50%);background:#000;border:var(--border);color:#fff;
    padding:11px 18px;border-radius:24px;font-size:14px;font-weight:600;z-index:80;
    opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}

  .hidden{display:none!important;}
  input[type=file]{display:none;}

  /* ---- Hebrew / right-to-left ---- */
  html[dir="rtl"] .field label{letter-spacing:normal;text-transform:none;}
  html[dir="rtl"] header h1{letter-spacing:normal;}
  /* Times and dates are numeric: they must ALWAYS read left-to-right, or Hebrew
     mirrors the segments and the hours land where minutes should be. */
  input[type=time],input[type=date]{direction:ltr;}
  html[dir="rtl"] input[type=time],html[dir="rtl"] input[type=date]{text-align:right;}
  .badge[dir="ltr"]{direction:ltr;unicode-bidi:isolate;}
</style>
</head>
<body>

<header>
  <h1><span class="bolt">&#9889;</span> <span data-i18n="appTitle">The Emet Daily</span></h1>
  <button class="icon-btn" id="btnLang" title="Language">&#1506;&#1489;</button>
  <button class="icon-btn" id="btnAI" title="AI Prioritize">&#129504;</button>
  <button class="icon-btn" id="btnBackup" title="Backup / Restore">&#128190;</button>
  <button class="icon-btn" id="btnBell" title="Enable reminders">&#128276;</button>
  <button class="icon-btn" id="btnSettings" title="Settings">&#9881;</button>
</header>

<div class="tabs">
  <div class="tab active" data-view="matrix" data-i18n="tabMatrix">Priority Matrix</div>
  <div class="tab" data-view="today" data-i18n="tabToday">Today</div>
</div>
<div class="hint" id="hint"></div>
<div class="stats" id="stats"></div>

<main id="app"></main>

<button class="fab" id="fab">+</button>

<!-- Editor sheet -->
<div class="sheet-wrap" id="editWrap">
  <div class="backdrop" data-close></div>
  <div class="sheet">
    <h2 id="editTitle" data-i18n="new_task">New Task</h2>
    <div class="field">
      <label data-i18n="f_title">Title</label>
      <input type="text" id="fTitle" data-i18n-ph="ph_title" placeholder="What needs doing?" autocomplete="off">
    </div>
    <div class="field">
      <label data-i18n="f_quad">Priority box</label>
      <div class="dropdown" id="fQuad">
        <div class="dd-selected" id="fQuadSelected">
          <span class="dd-caret">&#9662;</span><span class="dd-text"></span>
        </div>
        <div class="dd-list" id="fQuadList"></div>
      </div>
    </div>
    <div class="field">
      <label data-i18n="f_details">Details &amp; notes</label>
      <textarea id="fDetails" data-i18n-ph="ph_details" placeholder="Optional notes..."></textarea>
    </div>
    <div class="row">
      <div class="field">
        <label data-i18n="f_time">Reminder time</label>
        <input type="time" id="fTime" dir="ltr">
      </div>
      <div class="field">
        <label>&nbsp;</label>
        <button class="btn ghost" id="clearTime" data-i18n="clear_time" style="margin-top:0;">Clear time</button>
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label data-i18n="f_date">Reminder date (optional)</label>
        <input type="date" id="fDate" dir="ltr">
      </div>
      <div class="field">
        <label>&nbsp;</label>
        <button class="btn ghost" id="clearDate" data-i18n="clear_date" style="margin-top:0;">Clear date</button>
      </div>
    </div>
    <div class="field">
      <label data-i18n="f_repeat">Repeat</label>
      <div class="segmented" id="fRepeat"></div>
    </div>
    <div class="field">
      <label data-i18n="f_color">Card color</label>
      <div class="swatches" id="swatches"></div>
    </div>
    <button class="btn primary" id="saveTask" data-i18n="save_task">Save Task</button>
    <div class="btn-row">
      <button class="btn ghost" id="doneTask" data-i18n="toggle_done">Toggle Done</button>
      <button class="btn danger" id="delTask" data-i18n="delete">Delete</button>
    </div>
  </div>
</div>

<!-- Backup sheet -->
<div class="sheet-wrap" id="backupWrap">
  <div class="backdrop" data-close></div>
  <div class="sheet">
    <h2 data-i18n="backup_title">Backup &amp; Restore</h2>
    <p style="color:var(--muted);font-size:13px;margin-top:0;" data-i18n="backup_desc">
      Your tasks live only on this device. Export a backup file to keep them safe or move them to another phone.
    </p>
    <button class="btn primary" id="doExport" data-i18n="export">Export backup file</button>
    <button class="btn ghost" id="doImport" data-i18n="import" style="margin-top:10px;">Restore from file</button>
    <button class="btn danger" id="doClear" data-i18n="clear_all" style="margin-top:10px;">Clear all tasks</button>
    <input type="file" id="importFile" accept=".json,application/json">
  </div>
</div>

<!-- Settings sheet -->
<div class="sheet-wrap" id="settingsWrap">
  <div class="backdrop" data-close></div>
  <div class="sheet">
    <h2 data-i18n="settings_title">Settings</h2>
    <p style="color:var(--muted);font-size:13px;margin-top:0;" data-i18n="settings_desc">
      The API key is stored only on this device and is used by AI Prioritize.
    </p>
    <div class="field">
      <label data-i18n="f_apikey">Gemini API key</label>
      <div style="display:flex;gap:8px;">
        <input type="password" id="fApiKey" data-i18n-ph="ph_apikey" placeholder="Paste your Gemini API key..." autocomplete="off" style="flex:1;">
        <button class="icon-btn" id="toggleKey" style="height:auto;" data-i18n="show_key">Show</button>
      </div>
    </div>
    <div class="field">
      <label data-i18n="f_model">AI model</label>
      <input type="text" id="fModel" autocomplete="off">
    </div>
    <button class="btn primary" id="saveSettings" data-i18n="save_settings">Save Settings</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
